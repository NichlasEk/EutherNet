[server]
name = "eutheroxide"
lan_host = "192.168.32.186"
public_host = "apothictech.se"
ssh_host_alias = ""
command_transport = "local"
inventory_root = "/home/nichlas/EutherNet/state/live-inventory"
state_root = "/home/nichlas/EutherNet/state"

[security]
redact_secrets = true
write_raw_command_output = false
allow_write_actions = true
eutherid_url = "http://127.0.0.1:8792"
eutherid_consumer_token_file = "/etc/euthernet/eutherid-consumer-token"

[[collectors]]
name = "system"
enabled = true
interval_seconds = 3600

[[collectors]]
name = "systemd"
enabled = true
interval_seconds = 900


[[collectors]]
name = "systemd_user"
enabled = true
interval_seconds = 900

[[collectors]]
name = "git_repositories"
enabled = true
interval_seconds = 1800
roots = ["/home/nichlas"]

[[collectors]]
name = "network"
enabled = true
interval_seconds = 900

[[collectors]]
name = "backup"
enabled = true
interval_seconds = 900

[ai]
enabled = true
endpoint = "http://127.0.0.1:11434"
model = "qwen3-coder:30b"
send_raw_logs = false

[mcp]
enabled = true
transport = "stdio"

[eutherium]
host_dir = "/home/nichlas/EutherOxide/.euther-host"

[http]
enabled = true
host = "127.0.0.1"
port = 8791

[commands]
allow_remote = true

[[commands.allowed]]
name = "eutherid-step-up-test"
description = "Exercise the EutherID write boundary without changing server state."
mode = "write"
enabled = true
required_action = "euthernet.step-up.test"
target = "euthernet"
command = "/usr/bin/printf 'eutherid-step-up-ok\\n'"

[[commands.allowed]]
name = "health"
description = "Show hostname, uptime, failed services, and disk usage."
mode = "read"
command = "hostname && uptime && systemctl list-units --type=service --state=failed --no-pager --plain && df -hT"

[[commands.allowed]]
name = "failed-services"
description = "List failed systemd services."
mode = "read"
command = "systemctl list-units --type=service --state=failed --no-pager --plain"

[[commands.allowed]]
name = "listening-ports"
description = "List listening TCP and UDP ports."
mode = "read"
command = "ss -tuln"

[[commands.allowed]]
name = "disk"
description = "Show filesystem usage."
mode = "read"
command = "df -hT"

[[commands.allowed]]
name = "uptime"
description = "Show server uptime and load."
mode = "read"
command = "uptime"

[[commands.allowed]]
name = "restart-eutherhost"
description = "Restart the EutherHost system service."
mode = "write"
enabled = true
required_action = "service.restart"
target = "eutherhost.service"
command = "sudo -n /usr/bin/systemctl restart eutherhost.service && /usr/bin/systemctl is-active eutherhost.service"
preflight = "sudo -n /usr/bin/systemctl is-active eutherhost.service"
verify = "sudo -n /usr/bin/systemctl is-active eutherhost.service"
settle_seconds = 2

[[commands.allowed]]
name = "euthergate-health"
description = "Check the admin-only EutherGate reverse tunnel on server localhost."
mode = "read"
command = "/usr/bin/curl -fsS http://127.0.0.1:18787/api/health"

[[commands.allowed]]
name = "euthergate-turn-health"
description = "Show TURN relay service state and listening ports without exposing credentials."
mode = "read"
command = "/usr/bin/systemctl is-active euthergate-turn-3478.service euthergate-turn-443-udp.service && /usr/bin/ss -lntup | /usr/bin/grep -E ':(443|3478|491[6-9][0-9])\\b'"

[[commands.allowed]]
name = "restart-euthergate-turn"
description = "Restart both EutherGate TURN relays and verify their listeners."
mode = "write"
required_action = "service.restart"
enabled = true
target = "euthergate-turn.service-group"
command = "sudo -n /usr/local/sbin/euthergate-turn-restart"
preflight = "/usr/bin/systemctl is-active euthergate-turn-3478.service euthergate-turn-443-udp.service"
verify = "/usr/bin/systemctl is-active euthergate-turn-3478.service euthergate-turn-443-udp.service"
settle_seconds = 2

[[commands.allowed]]
name = "restart-caddy"
description = "Restart the Caddy reverse proxy service."
mode = "write"
required_action = "service.restart"
target = "caddy.service"
command = "sudo -n /usr/bin/systemctl restart caddy.service && /usr/bin/systemctl is-active caddy.service"

[[commands.allowed]]
name = "restart-eutherbooks"
description = "Restart the EutherBooks system service."
mode = "write"
enabled = true
required_action = "service.restart"
target = "eutherbooks.service"
command = "sudo -n /usr/bin/systemctl restart eutherbooks.service && /usr/bin/systemctl is-active eutherbooks.service"
preflight = "sudo -n /usr/bin/systemctl is-active eutherbooks.service"
verify = "sudo -n /usr/bin/systemctl is-active eutherbooks.service"
settle_seconds = 2

[[commands.allowed]]
name = "restart-eutherpunkd"
description = "Restart the EutherPunk user service."
mode = "write"
enabled = true
required_action = "service.restart"
target = "eutherpunkd.service"
command = "/usr/bin/systemctl --user restart eutherpunkd.service && /usr/bin/systemctl --user is-active eutherpunkd.service"
preflight = "/usr/bin/systemctl --user is-active eutherpunkd.service"
verify = "/usr/bin/systemctl --user is-active eutherpunkd.service"
settle_seconds = 2


[[commands.allowed]]
name = "restart-eutherpal"
description = "Restart the EutherPal user service."
mode = "write"
enabled = true
required_action = "service.restart"
target = "eutherpal.service"
command = "/usr/bin/systemctl --user restart eutherpal.service && /usr/bin/systemctl --user is-active eutherpal.service"
preflight = "/usr/bin/systemctl --user is-active eutherpal.service"
verify = "/usr/bin/systemctl --user is-active eutherpal.service"
settle_seconds = 2

[[commands.allowed]]
name = "restart-euthersync"
description = "Restart the EutherSync system service."
mode = "write"
enabled = true
required_action = "service.restart"
target = "euthersync.service"
command = "sudo -n /usr/bin/systemctl restart euthersync.service && /usr/bin/systemctl is-active euthersync.service"
preflight = "sudo -n /usr/bin/systemctl is-active euthersync.service"
verify = "sudo -n /usr/bin/systemctl is-active euthersync.service"
settle_seconds = 2

[[commands.allowed]]
name = "restart-euther-watchdog"
description = "Restart the Euther watchdog system service."
mode = "write"
enabled = true
required_action = "service.restart"
target = "euther-watchdog.service"
command = "sudo -n /usr/bin/systemctl restart euther-watchdog.service && /usr/bin/systemctl is-active euther-watchdog.service"
preflight = "sudo -n /usr/bin/systemctl is-active euther-watchdog.service"
verify = "sudo -n /usr/bin/systemctl is-active euther-watchdog.service"
settle_seconds = 2

[[commands.allowed]]
name = "euthersight-health"
description = "Show EutherSight AI, SecondSight, and EutherBird health through the EutherSight AI tunnel."
mode = "read"
command = "/usr/bin/curl -fsS http://127.0.0.1:15101/health"

[[commands.allowed]]
name = "euthersight-frigate-health"
description = "Check whether the Frigate tunnel on 127.0.0.1:15000 returns API stats."
mode = "read"
command = "/usr/bin/timeout 8 /usr/bin/curl -fsS http://127.0.0.1:15000/api/stats"

[[commands.allowed]]
name = "restart-euthersight-frigate-tunnel"
description = "Restart the local reverse SSH listener for the Frigate tunnel and then check Frigate stats."
mode = "write"
required_action = "service.restart"
target = "euthersight-frigate-tunnel.service"
command = "sudo -n /usr/local/sbin/euthersight-frigate-tunnel-restart"

[[commands.allowed]]
name = "restart-euthersight-frigate"
description = "Restart Frigate on the camera workstation through the EutherSight EutherNet tunnel."
mode = "write"
required_action = "service.restart"
target = "euthersight-frigate.service"
command = "/usr/bin/curl -fsS -X POST http://127.0.0.1:15196/api/euthernet/run -H 'Content-Type: application/json' -d '{\"name\":\"restart-euthersight-frigate\"}' && /usr/bin/curl -fsS http://127.0.0.1:15000/api/yard/latest.jpg --output /tmp/euthersight-server-map-restart-check.jpg && /usr/bin/file /tmp/euthersight-server-map-restart-check.jpg"
