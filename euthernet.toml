[server]
name = "eutheroxide"
lan_host = "192.168.32.186"
public_host = "apothictech.se"
ssh_host_alias = "euther-server"
command_transport = "ssh"
inventory_root = "inventory"
state_root = "state"

[security]
redact_secrets = true
write_raw_command_output = false
allow_write_actions = false

[[collectors]]
name = "system"
enabled = true
interval_seconds = 3600

[[collectors]]
name = "systemd"
enabled = true
interval_seconds = 900

[[collectors]]
name = "git_repositories"
enabled = true
interval_seconds = 1800
roots = ["/home/nichlas"]

[[collectors]]
name = "network"
enabled = true
interval_seconds = 900

[ai]
enabled = true
endpoint = "http://127.0.0.1:11434"
model = "qwen3-coder:30b"
send_raw_logs = false

[mcp]
enabled = true
transport = "stdio"

[http]
enabled = true
host = "127.0.0.1"
port = 8791

[commands]
allow_remote = true

[[commands.allowed]]
name = "health"
description = "Show hostname, uptime, failed services, and disk usage."
command = "hostname && uptime && systemctl list-units --type=service --state=failed --no-pager --plain && df -hT"

[[commands.allowed]]
name = "failed-services"
description = "List failed systemd services."
command = "systemctl list-units --type=service --state=failed --no-pager --plain"

[[commands.allowed]]
name = "listening-ports"
description = "List listening TCP and UDP ports."
command = "ss -tuln"

[[commands.allowed]]
name = "disk"
description = "Show filesystem usage."
command = "df -hT"

[[commands.allowed]]
name = "uptime"
description = "Show server uptime and load."
command = "uptime"

[[commands.allowed]]
name = "restart-eutherhost"
description = "Restart the EutherHost system service."
command = "sudo -n /usr/bin/systemctl restart eutherhost.service && /usr/bin/systemctl is-active eutherhost.service"

[[commands.allowed]]
name = "restart-caddy"
description = "Restart the Caddy reverse proxy service."
command = "sudo -n /usr/bin/systemctl restart caddy.service && /usr/bin/systemctl is-active caddy.service"

[[commands.allowed]]
name = "restart-eutherbooks"
description = "Restart the EutherBooks system service."
command = "sudo -n /usr/bin/systemctl restart eutherbooks.service && /usr/bin/systemctl is-active eutherbooks.service"

[[commands.allowed]]
name = "restart-eutherpunkd"
description = "Restart the EutherPunk user service."
command = "/usr/bin/systemctl --user restart eutherpunkd.service && /usr/bin/systemctl --user is-active eutherpunkd.service"
